function avBind(el,tx,inp,nm){var s=LS.getItem('wa_'+nm);if(s&&el){el.src=s;el.style.display='block';if(tx)tx.style.display='none';}inp.onchange=function(){var f=this.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),w=img.width,h=img.height,maxW=400,maxH=520;if(w>maxW){h*=maxW/w;w=maxW}if(h>maxH){w*=maxH/h;h=maxH}c.width=w;c.height=h;var ctx=c.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';ctx.drawImage(img,0,0,w,h);var d=c.toDataURL('image/jpeg',0.88);try{LS.setItem('wa_'+nm,d)}catch(e){}if(el){el.src=d;el.style.display='block'}if(tx)tx.style.display='none';};img.src=ev.target.result;};r.readAsDataURL(f);};}

function gTK(sub,data){var p=String(data||'').split('|');var colors=['red','blue','gold','purple','green'];var color=p[0]&&colors.indexOf(p[0])>=0?p.shift():colors[Math.floor(Math.random()*colors.length)];var title=p.shift()||'系统';if(!p.length)return'<div class="tkt '+color+'"><div class="tkt-bar"></div><div class="tkt-hd"><span class="tkt-title">'+esc(title)+'</span></div><div class="tkt-bd"><div class="tkt-plain">'+esc(sub==='万能'?title:p.join(' '))+'</div></div><div class="tkt-tear"></div></div>';var hasRows=false,bd='';for(var i=0;i<p.length;i++){var row=p[i];if(row.indexOf('◈')===0){hasRows=true;var idx=row.indexOf(':');if(idx<0)idx=row.indexOf(':');if(idx>0){bd+='<div class="tkt-row"><span class="tkt-diamond">◈</span><span class="tkt-key">'+esc(row.slice(1,idx).trim())+'：</span><span class="tkt-val">'+esc(row.slice(idx+1).trim())+'</span></div>';}else{bd+='<div class="tkt-row"><span class="tkt-diamond">◈</span><span class="tkt-val">'+esc(row.slice(1).trim())+'</span></div>';}}else{bd+='<div class="tkt-plain">'+esc(row)+'</div>';}}return'<div class="tkt '+color+'"><div class="tkt-bar"></div><div class="tkt-hd"><span class="tkt-title">'+esc(title)+'</span></div><div class="tkt-bd">'+bd+'</div><div class="tkt-tear"></div></div>';}

function makeTask(raw,type){if(!raw)return'';var q=String(raw).split('~'),cls=type==='支线'?'s':'',pg=q[1]||'',pct=0;if(pg.indexOf('/')>0){var pp=pg.split('/');pct=Math.min(100,(parseInt(pp[0])||0)/(parseInt(pp[1])||1)*100)}else pct=parseInt(pg)||0;return'<div class="ti '+cls+'"><div class="tr1"><span class="ttag">'+type+'</span><span class="tnm">'+esc(q[0]||'')+'</span></div><div class="tr2"><div class="tpt"><div class="tpf" style="width:'+pct+'%"></div></div><span class="tnum">'+esc(pg)+'</span></div><div class="trw">▸ '+esc(q[2]||'')+'</div>'+(q[3]?'<div class="tev">'+esc(q[3])+'</div>':'')+'</div>';}

function gPanel(data){var p=String(data||'').split('|');var rank=p[0]||'未知',title=p[1]||'',comment=p[2]||'',equipsRaw=p[3]||'',attrsRaw=p[4]||'',mQ=p[5]||'',sQ=p[6]||'';var allSlots=['发型','饰品','妆容','上衣','下装','连衣裙','袜类','鞋子','特殊'];var allAttrs=['智力','魅力','体质','力量','敏捷','魔力','意志','幸运'];var equipMap={},attrMap={},savedAttrs={};try{savedAttrs=JSON.parse(LS.getItem('wattr')||'{}')}catch(x){}var eL=equipsRaw.split(',');for(var i=0;i<eL.length;i++){if(!eL[i])continue;var s=eL[i].split('~');if(s[0])equipMap[s[0]]=s[1]||'无';}var aL=attrsRaw.split(',');for(var i=0;i<aL.length;i++){if(!aL[i])continue;var s=aL[i].split('~');if(s[0]){var v=s[1]==='???'?'???':(parseInt(s[1])||0);attrMap[s[0]]={v:v,d:s[2]||'0'};if(v!=='???')savedAttrs[s[0]]=v;}}try{LS.setItem('wattr',JSON.stringify(savedAttrs))}catch(x){}var id=uid(),equipH='',attrH='';for(var i=0;i<allSlots.length;i++){var sl=allSlots[i],vl=equipMap[sl]||'无';equipH+='<div class="eq-slot"><span class="eq-label">'+esc(sl)+'</span><span class="eq-val">'+esc(vl)+'</span></div>';}for(var i=0;i<allAttrs.length;i++){var nm=allAttrs[i],ad=attrMap[nm],v,dH='';if(ad){v=ad.v;if(ad.d&&ad.d!=='0'){var cl=ad.d.charAt(0)==='+'?'plus':'minus';dH='<span class="av-delta '+cl+'">'+esc(ad.d)+'</span>';}}else{v=savedAttrs[nm]!==undefined?savedAttrs[nm]:'-';}var bw=(typeof v==='number')?Math.min(v,100):0;attrH+='<div class="ai"><span class="al">'+esc(nm)+'</span><div class="ab"><div class="af" style="width:'+bw+'%"></div></div><span class="av">'+esc(String(v))+'</span>'+dH+'</div>';}var tBadge=(mQ||sQ)?'<span class="sub-badge">✦ 更新</span>':'';return'<div class="rp"><details><summary><div class="rp-h"><div class="rp-hl"><div class="dot dg"></div><span class="rp-ttl">个人面板</span></div><span class="rp-arr">▾</span></div></summary><div class="rp-bd"><div class="pf-top"><div class="pf-img" onclick="document.getElementById(\''+id+'\').click()"><img id="'+id+'-i" src="" style="display:none"><div id="'+id+'-p" class="pf-ph"><span class="pf-pht">点击<br>导入立绘</spa function renderFdList(){
var el=document.getElementById('fList');if(!el)return;
var fd=window.FOOD_DATA||{};
var tab=LS.getItem('wre_foodtab')||'全部';
var h='';
if(tab==='全部'){
  Object.keys(fd).forEach(function(c){
    h+='<div style="font-family:var(--ffm);font-size:.5em;color:var(--td);letter-spacing:1px;margin:6px 0 3px">'+c+'</div><div style="display:flex;flex-wrap:wrap;gap:3px">';
    fd[c].slice(0,12).forEach(function(d){h+='<div style="font-size:.55em;padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.06);color:var(--ts)">'+d+'</div>';});
    h+='</div>';
  });
}else{
  var items=fd[tab]||[];
  h+='<div style="display:flex;flex-wrap:wrap;gap:3px">';
  items.forEach(function(d){h+='<div style="font-size:.55em;padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.06);color:var(--ts)">'+d+'</div>';});
  h+='</div>';
}
el.innerHTML=h;
}
window.swFdTab=function(t){LS.setItem('wre_foodtab',t);init_food();};
window.rollFd=function(){var fd=window.FOOD_DATA||{};var all=[];Object.keys(fd).forEach(function(c){fd[c].forEach(function(d){all.push({cuisine:c,dish:d});});});if(!all.length)return;var pick=all[Math.floor(Math.random()*all.length)];document.getElementById('fRC').textContent=pick.cuisine;document.getElementById('fRN').textContent=pick.dish;};

})();
