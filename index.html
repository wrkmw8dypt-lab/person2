<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WRE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="nb"><div class="nb-o a"></div><div class="nb-o b"></div><div class="nb-o c"></div></div>
<div class="uni"><div id="R"></div></div>

<div class="orb" id="orbWrap">
<div class="orb-btn" id="orbBtn" onclick="togglePhone()">
<svg viewBox="0 0 26 26" width="22" height="22"><circle cx="13" cy="13" r="4" stroke="rgba(200,192,178,.75)" stroke-width="1.5" fill="none"/><path d="M13 3v2M13 21v2M3 13h2M21 13h2M5.6 5.6l1.5 1.5M18.9 18.9l1.5 1.5M5.6 20.4l1.5-1.5M18.9 7.1l1.5-1.5" stroke="rgba(200,192,178,.75)" stroke-width="1.3" stroke-linecap="round"/></svg>
</div>
</div>

<div class="phone-wrap" id="phoneWrap">
<div class="phone">
<div class="ph-notch"></div>
<div class="ph-status"><span id="phTime">9:41</span><span class="ph-batt">100%</span></div>
<div class="ph-home" id="homeScreen">
<div class="ph-home-t" id="homeT">9:41</div>
<div class="ph-home-d" id="homeD">周一 · 1月1日</div>
<div class="app-grid" id="appGrid"></div>
</div>
<div class="app-page" id="pg-settings"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">设置</div></div><div class="app-body" id="settingsBody"></div></div>
<div class="app-page" id="pg-wardrobe"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">生成器</div></div><div class="app-body" id="wardrobeBody"></div></div>
<div class="app-page" id="pg-contacts"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">通讯录</div><div class="app-action" onclick="openAddContact()">+</div></div><div class="app-body" id="contactsBody"></div><div id="ctDetailWrap"></div><div id="ctModalWrap"></div></div>
<div class="app-page" id="pg-food"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">吃什么</div></div><div class="app-body" id="foodBody"></div></div>
<div class="app-page" id="pg-cmd"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">指令集</div></div><div class="app-body" id="cmdBody"></div></div>
<div class="app-page" id="pg-bag"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">背包</div></div><div class="app-body" id="bagBody"></div></div>
<div class="app-page" id="pg-style"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">文风</div></div><div class="app-body" id="styleBody"></div></div>
<div class="app-page" id="pg-icon"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">换图标</div></div><div class="app-body" id="iconBody"></div></div>
<div class="app-page" id="pg-achieve"><div class="app-nav"><div class="app-back" onclick="goHome()"><svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="nav-title">成就</div></div><div class="app-body" id="achieveBody"></div></div>
<div class="ph-bar"></div>
</div>
</div>

<div class="tp-popup" id="tpPopup" onclick="if(event.target===this)this.classList.remove('show')">
<div class="tp-popup-card">
<div class="tp-pop-top"><span class="tp-pop-icon" id="popIcon">✦</span><span class="tp-pop-part" id="popPart"></span><span class="tp-pop-delta" id="popDelta"></span></div>
<div class="tp-pop-body"><div class="tp-pop-reaction" id="popReaction"></div><div class="tp-pop-inner" id="popInner"></div></div>
<div class="tp-pop-close" onclick="document.getElementById('tpPopup').classList.remove('show')">轻触关闭</div>
</div></div>

<div id="T" class="toast"></div>
<script src="data.js"></script>
<script src="main.js"></script>
<script src="apps.js"></script>
</body>
</html>
